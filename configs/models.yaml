# Model catalog: single source of truth for all model configuration.
# Business code MUST NOT reference model names, providers, base_url, or api_key directly.
# Always resolve models via rag.models.runtime.resolve_runtime_config().
#
# Layers:
#   models     — what a model IS (identity, no task params)
#   defaults   — which model for each capability
#   generation — how to USE models (per-task model selection + params)

models:
  qwen3_14b_4bit:
    capability: chat
    provider: qwen
    protocol: openai_compatible
    model: mlx-community/Qwen3-14B-4bit
    base_url: http://127.0.0.1:8080/v1

  qwen3_0_6b_4bit:
    capability: chat
    provider: qwen
    protocol: openai_compatible
    model: mlx-community/Qwen3-0.6B-4bit
    base_url: http://127.0.0.1:8080/v1

  qwen3_8b_mlx_4bit:
    capability: chat
    provider: qwen
    protocol: openai_compatible
    model: Qwen/Qwen3-8B-MLX-4bit
    base_url: http://127.0.0.1:8080/v1

  deepseek_chat:
    capability: chat
    provider: deepseek
    protocol: openai_compatible
    model: deepseek-chat
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY

  deepseek_reasoner:
    capability: chat
    provider: deepseek
    protocol: openai_compatible
    model: deepseek-reasoner
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY

  deepseek_v4_flash:
    capability: chat
    provider: deepseek
    protocol: openai_compatible
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY

  qwen3_embedding_8b_4bit_dwq:
    capability: embedding
    provider: qwen
    protocol: mlx_embedding
    model: mlx-community/Qwen3-Embedding-8B-4bit-DWQ
    embedding_space: mlx/Qwen3-Embedding-8B-4bit-DWQ

  qwen3_embedding_4b_4bit_dwq:
    capability: embedding
    provider: qwen
    protocol: mlx_embedding
    model: mlx-community/Qwen3-Embedding-4B-4bit-DWQ
    embedding_space: mlx/Qwen3-Embedding-4B-4bit-DWQ

  bge_reranker_v2_m3:
    capability: reranker
    provider: bge
    protocol: sentence_transformers
    model: BAAI/bge-reranker-v2-m3

  qwen3_reranker_4b:
    capability: reranker
    provider: qwen
    protocol: sentence_transformers
    model: Qwen/Qwen3-Reranker-4B

  mimo_cloud:
    capability: chat
    provider: mimo
    protocol: openai_compatible
    model: mimo-v2-flash
    base_url: https://api.xiaomimimo.com/v1/chat/completions
    api_key_env: MIMO_API_KEY


defaults:
  primary_model: mimo_cloud
  embedding_model: qwen3_embedding_4b_4bit_dwq
  reranker_model: bge_reranker_v2_m3

generation:
  # 默认继承 defaults.primary_model。
  # 只有某个任务必须使用特殊模型时，才在该任务下单独写 model: <chat_model_alias>。
  summary:
    max_tokens: 2048
    temperature: 0.3

  answer:
    max_tokens: 4096
    temperature: 0.7

  planner:
    max_tokens: 4096
    temperature: 0.3

  synthesize:
    max_tokens: 8192
    temperature: 0.5

  factcheck:
    max_tokens: 2048
    temperature: 0.1

tokenizer:
  tokenizer_backend: auto
  chunk_token_size: 480
  chunk_overlap_tokens: 64
  max_context_tokens: 4096
  prompt_reserved_tokens: 256
  local_files_only: true

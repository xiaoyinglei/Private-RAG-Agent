# Model catalog: single source of truth for model configuration.
#
# Design rules:
#   1. Business code MUST NOT reference provider names, base_url, api_key, or raw model names directly.
#   2. Resolve models only through rag.models.runtime.resolve_runtime_config().
#   3. Provider = how to connect.
#   4. Model = what model to use.
#   5. Generation = how to use the selected model for a task.
#   6. Budgets/tokenizer = runtime limits, not model identity.

# ---------------------------------------------------------------------------
# Providers: connection-level configuration.
# ---------------------------------------------------------------------------
providers:
  local_mlx_chat_8080:
    protocol: openai_compatible
    location: local
    base_url: http://127.0.0.1:8080/v1
    runtime:
      server: mlx_lm.server
      host: 127.0.0.1
      port: 8080
      health_url: http://127.0.0.1:8080/v1/models
      startup_timeout_seconds: 120
      poll_interval_seconds: 1
      launch_command_template:
        - uv
        - run
        - python
        - -m
        - mlx_lm.server
        - --model
        - "{model}"
        - --host
        - 127.0.0.1
        - --port
        - "8080"
        - --chat-template-args
        - '{"enable_thinking": false}'

  deepseek:
    protocol: openai_compatible
    location: cloud
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY

  groq:
    protocol: openai_compatible
    location: cloud
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY

  mimo:
    protocol: openai_compatible
    location: cloud
    base_url: https://token-plan-cn.xiaomimimo.com/v1
    api_key_env: MIMO_API_KEY

  local_mlx_embedding:
    protocol: mlx_embedding
    location: local

  local_sentence_transformers:
    protocol: sentence_transformers
    location: local


# ---------------------------------------------------------------------------
# Models: model identity only.
# ---------------------------------------------------------------------------
models:
  # -------------------------------------------------------------------------
  # Chat models: local MLX.
  # -------------------------------------------------------------------------
  qwen3_0_6b_mlx_4bit:
    capability: chat
    provider: local_mlx_chat_8080
    model: mlx-community/Qwen3-0.6B-4bit
    context_window_tokens: 32768
    runtime:
      expected_model_contains: Qwen3-0.6B-4bit

  qwen3_8b_mlx_4bit:
    capability: chat
    provider: local_mlx_chat_8080
    model: mlx-community/Qwen3-8B-4bit
    context_window_tokens: 32768
    runtime:
      expected_model_contains: Qwen3-8B-4bit

  qwen3_14b_mlx_4bit:
    capability: chat
    provider: local_mlx_chat_8080
    model: mlx-community/Qwen3-14B-4bit
    context_window_tokens: 32768
    runtime:
      expected_model_contains: Qwen3-14B-4bit

  qwen3_5_9b_mlx_4bit:
    capability: chat
    provider: local_mlx_chat_8080
    model: mlx-community/Qwen3.5-9B-4bit
    context_window_tokens: 262144
    runtime:
      expected_model_contains: Qwen3.5-9B-4bit

  # -------------------------------------------------------------------------
  # Chat models: DeepSeek.
  # -------------------------------------------------------------------------
  deepseek_chat:
    capability: chat
    provider: deepseek
    model: deepseek-chat
    context_window_tokens: 128000

  deepseek_reasoner:
    capability: chat
    provider: deepseek
    model: deepseek-reasoner
    context_window_tokens: 128000

  # Keep only if your DeepSeek account actually supports this model.
  deepseek_v4_flash:
    capability: chat
    provider: deepseek
    model: deepseek-v4-flash
    context_window_tokens: 128000
    experimental: true

  # -------------------------------------------------------------------------
  # Chat models: Groq.
  # -------------------------------------------------------------------------
  groq_gpt_oss_120b:
    capability: chat
    provider: groq
    model: openai/gpt-oss-120b
    context_window_tokens: 131072

  groq_llama_3_3_70b:
    capability: chat
    provider: groq
    model: llama-3.3-70b-versatile
    context_window_tokens: 32768

  # -------------------------------------------------------------------------
  # Chat models: MiMo.
  # -------------------------------------------------------------------------
  mimo_cloud:
    capability: chat
    provider: mimo
    model: mimo-v2.5-pro
    context_window_tokens: 256000

  # -------------------------------------------------------------------------
  # Embedding models.
  # -------------------------------------------------------------------------
  qwen3_embedding_8b_4bit_dwq:
    capability: embedding
    provider: local_mlx_embedding
    model: mlx-community/Qwen3-Embedding-8B-4bit-DWQ
    embedding_space: mlx/Qwen3-Embedding-8B-4bit-DWQ

  qwen3_embedding_4b_4bit_dwq:
    capability: embedding
    provider: local_mlx_embedding
    model: mlx-community/Qwen3-Embedding-4B-4bit-DWQ
    embedding_space: mlx/Qwen3-Embedding-4B-4bit-DWQ

  # -------------------------------------------------------------------------
  # Reranker models.
  # -------------------------------------------------------------------------
  bge_reranker_v2_m3:
    capability: reranker
    provider: local_sentence_transformers
    model: BAAI/bge-reranker-v2-m3

  qwen3_reranker_4b:
    capability: reranker
    provider: local_sentence_transformers
    model: Qwen/Qwen3-Reranker-4B


# ---------------------------------------------------------------------------
# Defaults: what to use when no explicit model is requested.
# ---------------------------------------------------------------------------
defaults:
  # For local-only testing, change this to qwen3_8b_mlx_4bit.
  # For cloud-quality agent testing, groq_gpt_oss_120b or deepseek_chat is better.
  primary_model: groq_gpt_oss_120b

  embedding_model: qwen3_embedding_8b_4bit_dwq
  reranker_model: qwen3_reranker_4b


# ---------------------------------------------------------------------------
# Generation profiles: how each task uses the selected chat model.
# Do not bind a model here unless a task truly requires a special model.
# ---------------------------------------------------------------------------
generation:
  summary:
    max_tokens: 1024
    temperature: 0.3

  answer:
    max_tokens: 4096
    temperature: 0.7

  planner:
    max_tokens: 2048
    temperature: 0.3

  synthesize:
    max_tokens: 4096
    temperature: 0.5

  factcheck:
    max_tokens: 2048
    temperature: 0.1

  memory_select:
    max_tokens: 256
    temperature: 0.1

  memory_extract:
    max_tokens: 2048
    temperature: 0.3

  memory_consolidate:
    max_tokens: 4096
    temperature: 0.3

  tool_decision:
    max_tokens: 1024
    temperature: 0.2

  final_answer:
    max_tokens: 4096
    temperature: 0.5


# ---------------------------------------------------------------------------
# LLM stage budgets: input/output budget by internal LLM stage.
# ---------------------------------------------------------------------------
llm_budgets:
  goal_contract:
    max_input_tokens: 3000
    max_output_tokens: 512
    safety_margin_tokens: 256

  retrieval_hint:
    max_input_tokens: 2000
    max_output_tokens: 256
    safety_margin_tokens: 512

  tool_decision:
    max_input_tokens: 12000
    max_output_tokens: 768
    safety_margin_tokens: 512

  retrieval_summary:
    max_input_tokens: 6000
    max_output_tokens: 1024
    safety_margin_tokens: 512

  llm_summarize:
    max_input_tokens: 16000
    max_output_tokens: 2048
    safety_margin_tokens: 512

  llm_compare:
    max_input_tokens: 20000
    max_output_tokens: 3072
    safety_margin_tokens: 512

  llm_generate:
    max_input_tokens: 16000
    max_output_tokens: 3072
    safety_margin_tokens: 512

  rag_answer:
    max_input_tokens: 16000
    max_output_tokens: 4096
    safety_margin_tokens: 512

  final_synthesis:
    max_input_tokens: 24000
    max_output_tokens: 4096
    safety_margin_tokens: 512


# ---------------------------------------------------------------------------
# Tokenizer/chunking defaults.
# Model context window should come from models.<alias>.context_window_tokens.
# ---------------------------------------------------------------------------
tokenizer:
  tokenizer_backend: auto
  chunk_token_size: 480
  chunk_overlap_tokens: 64
  prompt_reserved_tokens: 256
  local_files_only: true

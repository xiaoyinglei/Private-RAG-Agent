# Model catalog: single source of truth for all model configuration.
# Business code MUST NOT reference model names, providers, base_url, or api_key directly.
# Always resolve models via rag.models.runtime.resolve_runtime_config().
#
# Layers:
#   models     — what a model IS (identity, no task params)
#   defaults   — which model for each capability
#   generation — how to USE models (per-task model selection + params)

models:
  qwen3_14b_4bit:
    capability: chat
    provider: qwen
    protocol: openai_compatible
    model: models--mlx-community--Qwen3-14B-4bit
    base_url: http://127.0.0.1:8080/v1
    context_window_tokens: 32768
    location: local
    runtime:
      health_url: http://127.0.0.1:8080/v1/models
      launch_command:
        - uv
        - run
        - python
        - -m
        - mlx_lm.server
        - --model
        - models--mlx-community--Qwen3-14B-4bit
        - --host
        - 127.0.0.1
        - --port
        - "8080"
        - --chat-template-args
        - '{"enable_thinking": false}'
      expected_model_contains: models--mlx-community--Qwen3-14B-4bit
      startup_timeout_seconds: 120
      poll_interval_seconds: 1

  qwen3_0_6b_4bit:
    capability: chat
    provider: qwen
    protocol: openai_compatible
    model: mlx-community/Qwen3-0.6B-4bit
    base_url: http://127.0.0.1:8080/v1
    context_window_tokens: 32768
    location: local
    runtime:
      health_url: http://127.0.0.1:8080/v1/models
      launch_command:
        - uv
        - run
        - python
        - -m
        - mlx_lm.server
        - --model
        - mlx-community/Qwen3-0.6B-4bit
        - --host
        - 127.0.0.1
        - --port
        - "8080"
        - --chat-template-args
        - '{"enable_thinking": false}'
      expected_model_contains: mlx-community/Qwen3-0.6B-4bit
      startup_timeout_seconds: 120
      poll_interval_seconds: 1

  qwen3_8b_mlx_4bit:
    capability: chat
    provider: qwen
    protocol: openai_compatible
    model: Qwen/Qwen3-8B-MLX-4bit
    base_url: http://127.0.0.1:8080/v1
    context_window_tokens: 32768
    location: local
    runtime:
      health_url: http://127.0.0.1:8080/v1/models
      launch_command:
        - uv
        - run
        - python
        - -m
        - mlx_lm.server
        - --model
        - Qwen/Qwen3-8B-MLX-4bit
        - --host
        - 127.0.0.1
        - --port
        - "8080"
        - --chat-template-args
        - '{"enable_thinking": false}'
      expected_model_contains: Qwen/Qwen3-8B-MLX-4bit
      startup_timeout_seconds: 120
      poll_interval_seconds: 1

  deepseek:
    capability: chat
    provider: deepseek
    protocol: openai_compatible
    model: deepseek-chat
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    context_window_tokens: 128000
    location: cloud

  deepseek_chat:
    capability: chat
    provider: deepseek
    protocol: openai_compatible
    model: deepseek-chat
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    context_window_tokens: 128000
    location: cloud

  deepseek_reasoner:
    capability: chat
    provider: deepseek
    protocol: openai_compatible
    model: deepseek-reasoner
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    context_window_tokens: 128000
    location: cloud

  deepseek_v4_flash:
    capability: chat
    provider: deepseek
    protocol: openai_compatible
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    context_window_tokens: 128000
    location: cloud

  qwen3_embedding_8b_4bit_dwq:
    capability: embedding
    provider: qwen
    protocol: mlx_embedding
    model: mlx-community/Qwen3-Embedding-8B-4bit-DWQ
    embedding_space: mlx/Qwen3-Embedding-8B-4bit-DWQ

  qwen3_embedding_4b_4bit_dwq:
    capability: embedding
    provider: qwen
    protocol: mlx_embedding
    model: mlx-community/Qwen3-Embedding-4B-4bit-DWQ
    embedding_space: mlx/Qwen3-Embedding-4B-4bit-DWQ

  bge_reranker_v2_m3:
    capability: reranker
    provider: bge
    protocol: sentence_transformers
    model: BAAI/bge-reranker-v2-m3

  qwen3_reranker_4b:
    capability: reranker
    provider: qwen
    protocol: sentence_transformers
    model: Qwen/Qwen3-Reranker-4B

  mimo_cloud:
    capability: chat
    provider: mimo
    protocol: openai_compatible
    model: mimo-v2.5-pro
    base_url: https://token-plan-cn.xiaomimimo.com/v1
    api_key_env: MIMO_API_KEY
    context_window_tokens: 256000
    location: cloud


defaults:
  primary_model: qwen3_14b_4bit
  embedding_model: qwen3_embedding_8b_4bit_dwq
  reranker_model: qwen3_reranker_4b

generation:
  # 默认继承 defaults.primary_model。
  # 只有某个任务必须使用特殊模型时，才在该任务下单独写 model: <chat_model_alias>。
  summary:
    max_tokens: 1024
    temperature: 0.3

  answer:
    max_tokens: 4096
    temperature: 0.7

  planner:
    max_tokens: 2048
    temperature: 0.3

  synthesize:
    max_tokens: 4096
    temperature: 0.5

  factcheck:
    max_tokens: 2048
    temperature: 0.1

  # Memory operations — use the default local chat model unless explicitly overridden.
  memory_select:
    model: qwen3_8b_mlx_4bit
    max_tokens: 256
    temperature: 0.1
  memory_extract:
    model: qwen3_8b_mlx_4bit
    max_tokens: 2048
    temperature: 0.3
  memory_consolidate:
    model: qwen3_8b_mlx_4bit
    max_tokens: 4096
    temperature: 0.3

llm_budgets:
  goal_contract:
    max_input_tokens: 3000
    max_output_tokens: 512
    safety_margin_tokens: 256
  retrieval_hint:
    max_input_tokens: 2000
    max_output_tokens: 256
    safety_margin_tokens: 512
  tool_decision:
    max_input_tokens: 12000
    max_output_tokens: 2048
    safety_margin_tokens: 512
  retrieval_summary:
    max_input_tokens: 6000
    max_output_tokens: 1024
    safety_margin_tokens: 512
  llm_summarize:
    max_input_tokens: 16000
    max_output_tokens: 2048
    safety_margin_tokens: 512
  llm_compare:
    max_input_tokens: 20000
    max_output_tokens: 3072
    safety_margin_tokens: 512
  llm_generate:
    max_input_tokens: 16000
    max_output_tokens: 3072
    safety_margin_tokens: 512
  rag_answer:
    max_input_tokens: 16000
    max_output_tokens: 4096
    safety_margin_tokens: 512
  final_synthesis:
    max_input_tokens: 24000
    max_output_tokens: 4096
    safety_margin_tokens: 512

tokenizer:
  tokenizer_backend: auto
  chunk_token_size: 480
  chunk_overlap_tokens: 64
  max_context_tokens: 4096
  prompt_reserved_tokens: 256
  local_files_only: true

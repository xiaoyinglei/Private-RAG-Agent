version: 1

models:
  # 8B 4bit (~5GB)：默认主力，路由/评估/规划均够用
  local_main:
    provider: mlx
    model: Qwen/Qwen3-8B-MLX-4bit
    max_tokens: 2048
    timeout_seconds: 90
    defaults:
      temperature: 0.0
      top_p: 0.9

  # 14B 4bit (~8GB)：复杂规划时按需切换
  # 使用方法：在 AgentDefinition.model_selection 中设置 plan_model="local_large"
  local_large:
    provider: mlx
    model: mlx-community/Qwen3-14B-4bit
    max_tokens: 4096
    timeout_seconds: 120
    defaults:
      temperature: 0.0
      top_p: 0.9

default_model: local_main
# fallback_model 指向同模型避免双加载，错误时降级到规则兜底
# 如需热切换到大模型：fallback_model: local_large
fallback_model: local_main
